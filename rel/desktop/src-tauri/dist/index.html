<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    .splash {
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      color: #89b4fa;
    }
    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 1rem;
      border: 3px solid #313244;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 0.85rem;
      color: #6c7086;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">worth</div>
    <div class="spinner"></div>
    <div class="status">Starting...</div>
  </div>
</body>
</html>
