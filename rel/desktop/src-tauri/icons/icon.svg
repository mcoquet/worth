<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#13141f"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="50%" style="stop-color:#9d7aea"/>
      <stop offset="100%" style="stop-color:#bb86fc"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#2a2b3d" stroke-width="2"/>
  <!-- Glow behind W -->
  <path d="M130 160 L196 352 L256 240 L316 352 L382 160"
        stroke="url(#wg)" stroke-width="56" fill="none" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.3" filter="url(#glow)"/>
  <!-- Main W letterform -->
  <path d="M130 160 L196 352 L256 240 L316 352 L382 160"
        stroke="url(#wg)" stroke-width="48" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shine overlay on W -->
  <path d="M130 160 L196 352 L256 240 L316 352 L382 160"
        stroke="url(#shine)" stroke-width="48" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crown peaks (small triangles at top of each W arm) -->
  <polygon points="196,352 176,160 216,160" fill="url(#wg)" opacity="0.6"/>
  <polygon points="316,352 296,160 336,160" fill="url(#wg)" opacity="0.6"/>
  <!-- Center diamond accent -->
  <polygon points="256,200 276,240 256,280 236,240" fill="url(#wg)" opacity="0.4"/>
</svg>
